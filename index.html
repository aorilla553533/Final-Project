<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f0f8;
      --sidebar-bg: #ffffff;
      --card-bg: #ffffff;
      --accent: #f5a623;
      --accent-hover: #e09510;
      --danger: #f87171;
      --danger-hover: #ef4444;
      --text-primary: #1a1a2e;
      --text-secondary: #888;
      --text-label: #aaa;
      --border: #e8e8f0;
      --tab-active-bg: #ffe9c8;
      --tab-active-text: #d97706;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-card: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 16px;
      --sidebar-w: 110px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 32px;
      gap: 8px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      box-shadow: 2px 0 12px rgba(0,0,0,0.04);
      z-index: 10;
    }

    .sidebar-logo {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #ffecd2;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin-bottom: 4px;
    }

    .sidebar-user {
      text-align: center;
      padding: 0 8px 16px;
      border-bottom: 1px solid var(--border);
      width: 100%;
    }
    .sidebar-user .name {
      font-size: 11px; font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .sidebar-user .email {
      font-size: 9px; color: var(--text-label);
      word-break: break-all;
    }

    .sidebar-nav {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      margin-top: 8px; width: 100%;
    }

    .nav-item {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 22px;
      transition: background 0.2s;
      color: var(--text-secondary);
    }
    .nav-item:hover { background: #f4f4fc; }
    .nav-item.active {
      background: #fff4e6;
      color: var(--accent);
    }

    /* ── Main ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 32px 36px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 28px;
    }
    .topbar-left h2 {
      font-size: 22px; font-weight: 800;
      color: var(--text-primary);
    }
    .topbar-left .subtitle {
      font-size: 12px; color: var(--text-secondary);
      margin-top: 2px;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 14px;
    }
    .status-badge {
      background: #ecfdf5;
      color: #10b981;
      font-size: 11px; font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
      display: flex; align-items: center; gap: 5px;
    }
    .status-badge::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #10b981;
    }
    .bell-btn {
      width: 36px; height: 36px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }
    .bell-btn:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

    /* ── Section header ── */
    .section-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 6px;
    }
    .section-header h3 {
      font-size: 20px; font-weight: 800;
    }
    .section-header p {
      font-size: 12px; color: var(--text-secondary); margin-top: 2px;
    }

    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px; font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; gap: 6px;
    }
    .add-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .add-btn:active { transform: translateY(0); }

    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex; gap: 8px;
      margin: 14px 0 20px;
    }
    .tab {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px; font-weight: 700;
      font-family: 'Nunito', sans-serif;
      border: none; cursor: pointer;
      background: #e8e8f4;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .tab:hover { background: #dcdcf0; }
    .tab.active {
      background: var(--tab-active-bg);
      color: var(--tab-active-text);
    }

    /* ── Product Grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 16px 14px;
      box-shadow: var(--shadow-card);
      display: flex; flex-direction: column;
      gap: 6px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
    }

    .product-icon {
      font-size: 40px;
      margin-bottom: 6px;
      line-height: 1;
    }

    .product-name {
      font-size: 14px; font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .product-category {
      font-size: 11px; color: var(--text-secondary);
      font-weight: 500;
    }

    .product-price {
      font-size: 16px; font-weight: 800;
      color: var(--text-primary);
      margin-top: 4px;
    }

    .product-stock {
      font-size: 11px; color: var(--text-secondary);
    }

    .product-actions {
      display: flex; gap: 8px;
      margin-top: 8px;
    }

    .action-btn {
      flex: 1;
      height: 34px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      color: var(--text-secondary);
    }
    .action-btn:hover { background: #f4f4fc; border-color: #c0c0d8; }
    .action-btn.del {
      border-color: #fecaca;
      color: var(--danger);
    }
    .action-btn.del:hover { background: #fff1f1; border-color: var(--danger); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,10,30,0.45);
      backdrop-filter: blur(3px);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 20px;
      padding: 28px 28px 24px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: modalIn 0.22s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-title {
      font-size: 17px; font-weight: 800;
      margin-bottom: 20px;
    }

    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      margin-bottom: 14px;
    }

    .form-group {
      display: flex; flex-direction: column; gap: 5px;
      margin-bottom: 14px;
    }
    .form-group label {
      font-size: 11px; font-weight: 700;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      color: var(--text-primary);
      background: #fafafa;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); background: white; }

    .modal-actions {
      display: flex; gap: 10px; margin-top: 6px;
    }
    .btn-save {
      flex: 1;
      padding: 11px;
      background: var(--accent);
      color: white;
      border: none; border-radius: 12px;
      font-size: 13px; font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: var(--accent-hover); }
    .btn-cancel {
      padding: 11px 20px;
      background: #f0f0f8;
      color: var(--text-secondary);
      border: none; border-radius: 12px;
      font-size: 13px; font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-cancel:hover { background: #e4e4f0; }

    .error-msg {
      font-size: 12px; color: #ef4444;
      margin-top: -8px; margin-bottom: 4px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1a1a2e; color: white;
      padding: 10px 22px; border-radius: 30px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 200; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 48px 0;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }

    /* ── Loading ── */
    .skeleton {
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">🐾</div>
    <div class="sidebar-user">
      <div class="name">Charm De Castro</div>
      <div class="email">youremail@gmail.com</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" title="Home">🏠</div>
      <div class="nav-item" title="Favorites">🤍</div>
      <div class="nav-item" title="Orders">📦</div>
      <div class="nav-item" title="Settings">⚙️</div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-left">
        <h2>Good day, Charm 🐾</h2>
        <div class="subtitle" id="dateSubtitle"></div>
      </div>
      <div class="topbar-right">
        <div class="status-badge">Open Now</div>
        <div class="bell-btn" title="Notifications">🔔</div>
      </div>
    </div>

    <!-- Section Header -->
    <div class="section-header">
      <div>
        <h3>Products</h3>
       
      </div>
      <button class="add-btn" onclick="showForm()">+ Add Item</button>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('All', this)">All</button>
      <button class="tab" onclick="setFilter('Dog Food', this)">Dog Food</button>
      <button class="tab" onclick="setFilter('Dog Treat', this)">Dog Treat</button>
      <button class="tab" onclick="setFilter('Dog Shampoo', this)">Dog Shampoo</button>
    </div>

    <!-- Product Grid -->
    <div class="product-grid" id="productGrid"></div>

  </main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Add Product</div>
      <div class="error-msg" id="errorMsg"></div>

      <input type="hidden" id="productId">

      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input id="name" placeholder="e.g. Pedigree Adult" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option>Dog Food</option>
            <option>Dog Treat</option>
            <option>Dog Shampoo</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Price (₱)</label>
          <input id="price" type="number" step="0.01" placeholder="0.00" required>
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input id="stock" type="number" placeholder="0" required>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-save" onclick="saveProduct()">Save Product</button>
        <button class="btn-cancel" onclick="hideForm()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const api = 'petshop/products.php';
    let products = [];
    let activeFilter = 'All';

    // ── Date subtitle ──
    const d = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('dateSubtitle').textContent =
      d.toLocaleDateString('en-US', opts) + ' — PawShop is open';

    // ── Category → Emoji ──
    function categoryIcon(cat) {
      if (cat === 'Dog Food')    return '🍖';
      if (cat === 'Dog Treat')   return '🦴';
      if (cat === 'Dog Shampoo') return '🧴';
      return '🐾';
    }

    // ── Toast ──
    function showToast(msg, duration = 2800) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }

    // ── Fetch ──
    async function fetchProducts() {
      try {
        const res = await fetch(api);
        products = await res.json();
        renderProducts();
      } catch (err) {
        showToast('⚠️ Unable to load products.');
      }
    }

    // ── Filter ──
    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    }

    // ── Render ──
    function renderProducts() {
      const grid = document.getElementById('productGrid');
      const filtered = activeFilter === 'All'
        ? products
        : products.filter(p => p.category === activeFilter);

      if (!filtered.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🐶</div>
            <div>No products found.</div>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(item => `
        <div class="product-card">
          <div class="product-icon">${categoryIcon(item.category)}</div>
          <div class="product-name">${escHtml(item.name)}</div>
          <div class="product-category">${escHtml(item.category)}</div>
          <div class="product-price">₱${parseFloat(item.price).toFixed(2)}</div>
          <div class="product-stock">In stock: ${item.stock}</div>
          <div class="product-actions">
            <button class="action-btn" onclick="editProduct(${item.id})" title="Edit">✏️</button>
            <button class="action-btn del" onclick="deleteProduct(${item.id})" title="Delete">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Modal ──
    function showForm(product = null) {
      document.getElementById('productId').value = product?.id || '';
      document.getElementById('name').value = product?.name || '';
      document.getElementById('category').value = product?.category || 'Dog Food';
      document.getElementById('price').value = product?.price || '';
      document.getElementById('stock').value = product?.stock || '';
      document.getElementById('errorMsg').textContent = '';
      document.getElementById('modalTitle').textContent = product ? 'Edit Product' : 'Add Product';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function hideForm() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    // Close on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) hideForm();
    });

    // ── Save (Create / Update) ──
    async function saveProduct() {
      const id      = document.getElementById('productId').value;
      const name    = document.getElementById('name').value.trim();
      const price   = document.getElementById('price').value;
      const stock   = document.getElementById('stock').value;

      if (!name || !price || !stock) {
        document.getElementById('errorMsg').textContent = 'Please fill in all fields.';
        return;
      }

      const payload = {
        name,
        category: document.getElementById('category').value,
        price: parseFloat(price),
        stock: parseInt(stock, 10)
      };

      const url    = id ? `${api}?id=${id}` : api;
      const method = id ? 'PUT' : 'POST';

      try {
        const res  = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.errors?.join(', ') || data.error || 'Save failed');
        await fetchProducts();
        hideForm();
        showToast(id ? '✅ Product updated!' : '✅ Product added!');
      } catch (err) {
        document.getElementById('errorMsg').textContent = err.message;
      }
    }

    function editProduct(id) {
      const product = products.find(item => item.id == id);
      if (product) showForm(product);
    }

    // ── Delete ──
    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      try {
        const res  = await fetch(`${api}?id=${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Delete failed');
        await fetchProducts();
        showToast('🗑️ Product deleted.');
      } catch (err) {
        showToast('⚠️ ' + err.message);
      }
    }

    // ── Init ──
    fetchProducts();
  </script>
</body>
</html>
